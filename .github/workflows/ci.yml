name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw compile --no-transfer-progress

      # OWASP Dependency-Check is skipped until a reliable approach for the NVD
      # database update is found. Without an API key, rate limiting causes 30-40 min
      # runs. The NVD API key approach was attempted but did not resolve the issue.
      - name: Verify
        run: ./mvnw verify --no-transfer-progress -Dowasp.skip=true
