server:
  servlet:
    context-path: /api/v1

spring:
  application:
    name: fintech-transaction-api
  web:
    error:
      include-message: never
      include-stacktrace: never
      include-exception: false

logging:
  level:
    root: INFO

# api-docs.enabled must remain true — disabling it also disables the Swagger UI
springdoc:
  swagger-ui:
    url: /openapi.yaml
    path: /swagger-ui
  api-docs:
    enabled: true

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
